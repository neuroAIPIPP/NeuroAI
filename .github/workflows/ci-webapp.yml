name: CI - Web App
run-name: CI for Web App on commit ${{ github.sha }} by @${{ github.actor }}

on:
  pull_request:
    branches: ['**']
  push:
    branches: ['**']

jobs:
  ci:
    name: Lint and Prettier Check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./web_app
    steps:
      - name: Checkout branch
        uses: actions/checkout@v6

      - name: Install node
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: './web_app/package-lock.json'

      - name: Install dependencies
        run: npm ci

      - name: Lint check
        run: npm run lint

      - name: Prettier check
        run: npm run format:check

      - name: Run build check
        run: npm run build